# ЕЦС — заголовки безопасности для nginx.
# Подключение в server-блоке боевого домена:
#   server {
#     ...
#     include /path/to/deploy/nginx-security-headers.conf;
#   }
# Значения синхронизированы с frontend/_headers (Cloudflare Pages / Netlify).
#
# ВНИМАНИЕ по CSP: сначала прогоните в режиме отчёта, заменив на
#   add_header Content-Security-Policy-Report-Only "...";
# и убедитесь, что формы Битрикс24, калькуляторы и карта работают.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
# HSTS включайте только когда весь трафик уже на HTTPS (иначе заблокируете сайт):
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' mc.yandex.ru yastatic.net cdn-ru.bitrix24.ru *.bitrix24.ru agents.finuslugi.ru *.finuslugi.ru polis812.ru *.polis812.ru www.googletagmanager.com api-maps.yandex.ru; style-src 'self' 'unsafe-inline' yastatic.net; font-src 'self' data:; img-src 'self' data: mc.yandex.ru yastatic.net *.bitrix24.ru *.finuslugi.ru *.polis812.ru *.maps.yandex.net api-maps.yandex.ru www.googletagmanager.com www.google-analytics.com; connect-src 'self' mc.yandex.ru *.bitrix24.ru *.finuslugi.ru *.polis812.ru *.maps.yandex.net api-maps.yandex.ru www.google-analytics.com region1.google-analytics.com; frame-src 'self' *.bitrix24.ru *.finuslugi.ru *.polis812.ru; frame-ancestors 'self'; base-uri 'self'; form-action 'self' *.bitrix24.ru; object-src 'none'; upgrade-insecure-requests" always;
